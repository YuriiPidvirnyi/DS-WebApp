name: Secret Scan

# Scans every PR and push to main/develop for accidentally committed secrets.
# Uses gitleaks — scans the diff (PR) or full history (push to protected branch).
on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest

    # Required for gitleaks to annotate the PR
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v7
        with:
          # Fetch full history so gitleaks can scan all commits on push
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # gitleaks-action reads .gitleaks.toml from the repo root automatically
