name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Manual re-runs of the same commit — used to sample runner-dependent
  # failures (e2e prod-server spin reproduces only on some runners)
  workflow_dispatch:

# Cancel superseded runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Prettier
        run: npm run format:check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Parallel with lint — no dependency needed

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Coverage summary
        if: always()
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || echo "No coverage report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # NON-BLOCKING while `next start` is broken on GitHub-hosted runners:
  # since ~2026-07-06 the Next 16 production server allocates in native code
  # from startup until OOM without serving a single request, on every runner
  # flavor (ubuntu-24.04 and 22.04, kernels 6.17 and 6.8, EPYC 9V74 and 7763),
  # with old and fully regenerated lockfiles, next 16.2.9 and 16.2.10, pinned
  # turbopack root or not. The same build works locally and on Vercel. Full
  # investigation: PR #359. Related runner-image issue class:
  # actions/runner-images#12273 #12322 #13770.
  # Scheduled jobs (notifications/reminders/recall/low-stock/stock-metrics)
  # migrated off Vercel Cron to Supabase pg_cron + the process-notifications
  # edge fn, so the cron auth-gate route/tests were removed with this cutover.
  # Flip continue-on-error back to false once a run of this job is green again.
  e2e-browser:
    name: E2E browser suites (non-blocking — runner infra broken, see PR #359)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts','**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build for E2E
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:3000/supabase-mock
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NODE_OPTIONS: --max-old-space-size=3072

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Start server and wait for ready
        run: |
          mkdir -p /tmp/node-reports
          PORT=3000 NEXT_TELEMETRY_DISABLED=1 \
            NODE_OPTIONS="--max-old-space-size=1024 --report-on-fatalerror --report-directory=/tmp/node-reports" \
            NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3000 \
            NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:3000/supabase-mock \
            NEXT_PUBLIC_SUPABASE_ANON_KEY=test-anon-key \
            npm start > server.log 2>&1 &
          npx wait-on tcp:127.0.0.1:3000 --timeout 120000
          curl -4 -sS -o /dev/null -m 15 -w "probe GET / -> %{http_code} in %{time_total}s\n" http://127.0.0.1:3000/ || true

      # Step-level continue-on-error keeps the JOB green (a job-level flag
      # still paints a red X on the PR) while the outcome drives the warning.
      - name: Browser E2E (UI smoke + booking + auth gates + auth flows)
        id: e2e
        continue-on-error: true
        run: npx playwright test e2e/ui-form-controls.smoke.spec.ts e2e/booking-flow.spec.ts e2e/cabinet-flows.spec.ts e2e/admin-rbac.spec.ts e2e/auth-flows.spec.ts e2e/auth-confirm-flow.spec.ts --config=playwright.auth.config.ts
        env:
          PW_BASE_URL: http://127.0.0.1:3000

      - name: Server diagnostics on failure
        if: steps.e2e.outcome == 'failure'
        run: |
          echo "--- server.log tail"; tail -n 60 server.log || true
          for f in /tmp/node-reports/report.*.json; do
            [ -e "$f" ] || continue
            jq '{trigger: .header.trigger, stack: .javascriptStack.stack}' "$f" || true
          done

      - name: Non-blocking notice
        if: steps.e2e.outcome == 'failure'
        run: |
          echo "## ⚠️ E2E browser suites failed (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
          echo "next start is currently broken on GitHub-hosted runners (native allocation loop → OOM, zero requests served)." >> "$GITHUB_STEP_SUMMARY"
          echo "This does not gate the PR. Investigation: PR #359. Re-enable gating by setting continue-on-error: false once green." >> "$GITHUB_STEP_SUMMARY"

# NOTE: The production build job has been removed.
# Vercel's GitHub integration already builds and checks every PR —
# its check is the authoritative build gate. Duplicating it here
# added ~5 min of unnecessary CI time per PR.
#
# A11y audit now runs against the Vercel deployment URL in
# preview-validate.yml (deployment_status trigger), not against a
# throwaway localhost server.
#
# Security audit runs weekly in security-audit.yml (not per-PR).
