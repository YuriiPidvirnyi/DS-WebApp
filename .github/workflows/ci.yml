name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Prettier
        run: npm run format:check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Parallel with lint — no dependency needed

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Coverage summary
        if: always()
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || echo "No coverage report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  e2e-ui-smoke:
    name: E2E UI smoke (Select + language)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts','**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build for E2E
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # 127.0.0.1 (not localhost) avoids IPv6 resolution ambiguity on runners
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:3000/supabase-mock
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          # Cap Node heap during build to leave room for subsequent server + Chromium
          NODE_OPTIONS: --max-old-space-size=3072

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Start server and wait for ready
        run: |
          PORT=3000 NEXT_TELEMETRY_DISABLED=1 \
            NODE_OPTIONS=--max-old-space-size=4096 \
            NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3000 \
            NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:3000/supabase-mock \
            NEXT_PUBLIC_SUPABASE_ANON_KEY=test-anon-key \
            npm start > server.log 2>&1 &
          npx wait-on tcp:127.0.0.1:3000 --timeout 120000
          curl -4 -sS -o /dev/null -m 15 -w "probe GET / via 127.0.0.1 -> %{http_code} in %{time_total}s\n" http://127.0.0.1:3000/ || true
          curl -6 -sS -o /dev/null -m 15 -w "probe GET / via [::1] -> %{http_code} in %{time_total}s\n" "http://[::1]:3000/" || true

      - name: Playwright UI smoke
        run: npm run test:e2e:ui-smoke
        env:
          PW_BASE_URL: http://127.0.0.1:3000

      - name: Server diagnostics on failure
        if: failure()
        run: |
          echo "--- port 3000 listeners"; ss -tlnp | grep 3000 || true
          echo "--- memory"; free -m || true
          echo "--- top processes by RSS"; ps aux --sort=-rss | head -12 || true
          echo "--- server.log tail"; tail -n 200 server.log || true

  e2e-feature-suites:
    name: E2E feature suites (booking, cabinet, admin RBAC, cron)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts','**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build for E2E
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # 127.0.0.1 (not localhost) avoids IPv6 resolution ambiguity on runners
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:3000/supabase-mock
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NODE_OPTIONS: --max-old-space-size=3072

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Start server and wait for ready
        run: |
          PORT=3000 NEXT_TELEMETRY_DISABLED=1 \
            NODE_OPTIONS=--max-old-space-size=4096 \
            NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3000 \
            NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:3000/supabase-mock \
            NEXT_PUBLIC_SUPABASE_ANON_KEY=test-anon-key \
            npm start > server.log 2>&1 &
          npx wait-on tcp:127.0.0.1:3000 --timeout 120000
          curl -4 -sS -o /dev/null -m 15 -w "probe GET / via 127.0.0.1 -> %{http_code} in %{time_total}s\n" http://127.0.0.1:3000/ || true
          curl -6 -sS -o /dev/null -m 15 -w "probe GET / via [::1] -> %{http_code} in %{time_total}s\n" "http://[::1]:3000/" || true

      - name: Run feature E2E suites
        run: npx playwright test e2e/cron-notifications.spec.ts e2e/booking-flow.spec.ts e2e/cabinet-flows.spec.ts e2e/admin-rbac.spec.ts --config=playwright.auth.config.ts
        env:
          PW_BASE_URL: http://127.0.0.1:3000

      - name: Server diagnostics on failure
        if: failure()
        run: |
          echo "--- port 3000 listeners"; ss -tlnp | grep 3000 || true
          echo "--- memory"; free -m || true
          echo "--- top processes by RSS"; ps aux --sort=-rss | head -12 || true
          echo "--- server.log tail"; tail -n 200 server.log || true

# NOTE: The production build job has been removed.
# Vercel's GitHub integration already builds and checks every PR —
# its check is the authoritative build gate. Duplicating it here
# added ~5 min of unnecessary CI time per PR.
#
# A11y audit now runs against the Vercel deployment URL in
# preview-validate.yml (deployment_status trigger), not against a
# throwaway localhost server.
#
# Security audit runs weekly in security-audit.yml (not per-PR).
