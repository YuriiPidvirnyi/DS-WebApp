name: Auto-merge Dependabot (minor/patch)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    name: Enable auto-merge for minor/patch Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v7

      - name: Detect minor/patch update
        id: detect
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const title = context.payload.pull_request.title;
            // Dependabot titles look like "chore(deps): bump foo from 1.2.3 to 1.3.0"
            // Major bumps contain "from X to Y" where the major version increases.
            // We use a simple heuristic: skip if the title contains "major" or if the
            // major version number changes (e.g. "from 1.x to 2.x").
            const isBump = /bump /i.test(title);
            if (!isBump) {
              core.info('PR title does not look like a Dependabot bump — skipping.');
              return 'skip';
            }
            // Extract "from <version> to <version>"
            const match = title.match(/from\s+(\d+)\.\S+\s+to\s+(\d+)\./i);
            if (match) {
              const fromMajor = parseInt(match[1], 10);
              const toMajor   = parseInt(match[2], 10);
              if (toMajor > fromMajor) {
                core.info(`Major version bump detected (${fromMajor} → ${toMajor}) — skipping auto-merge.`);
                return 'skip';
              }
            }
            core.info('Minor or patch bump detected — will enable auto-merge.');
            return 'merge';

      - name: Enable auto-merge
        if: steps.detect.outputs.result == 'merge'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
