name: Weekly A11y Audit
on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Start server
        run: npm run start &

      - run: npx wait-on http://127.0.0.1:3000 --timeout 30000

      - name: Run a11y audit
        id: audit
        run: BASE_URL=http://127.0.0.1:3000 node scripts/a11y-audit.mjs
        continue-on-error: true

      - name: Open issue on violation
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[a11y] Weekly audit found violations — ${new Date().toISOString().slice(0,10)}`,
              body: 'The weekly accessibility audit found violations. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
              labels: ['accessibility', 'automated']
            })
