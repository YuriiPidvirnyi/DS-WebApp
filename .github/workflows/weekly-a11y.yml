name: Weekly A11y Audit

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC
  workflow_dispatch: # allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Weekly a11y audit
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:3000/supabase-mock
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start server and wait for ready
        run: |
          NODE_OPTIONS=--max-old-space-size=4096 npm start &
          npx wait-on http://localhost:3000 --timeout 120000

      - name: Run a11y audit
        id: audit
        run: BASE_URL=http://localhost:3000 npm run a11y:audit
        continue-on-error: true

      - name: Open issue on violation
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `a11y regression detected – ${new Date().toISOString().slice(0, 10)}`,
              body: `Weekly automated a11y audit found violations. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['a11y', 'automated']
            })
