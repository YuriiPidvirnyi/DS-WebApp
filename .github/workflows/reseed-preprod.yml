name: Reseed Preprod

# Runs automatically after every merge to develop.
# Wipes transactional data and re-seeds so the staging environment
# always reflects the latest schema and a clean realistic dataset.

on:
  push:
    branches: [develop]

concurrency:
  group: reseed-preprod
  cancel-in-progress: true

jobs:
  reseed:
    name: Wipe & reseed preprod
    runs-on: ubuntu-latest

    # Skip if the commit message opts out (useful for hotfix / schema-only merges)
    if: "!contains(github.event.head_commit.message, '[skip reseed]')"

    env:
      PREPROD_SUPABASE_URL: ${{ secrets.PREPROD_SUPABASE_URL }}
      PREPROD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PREPROD_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      # No separate preprod Supabase project configured? Skip cleanly instead of
      # failing — and never risk a destructive SEED_WIPE against an unconfigured
      # (or accidentally production) target.
      - name: Check preprod target is configured
        id: gate
        run: |
          if [ -n "$PREPROD_SUPABASE_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PREPROD_SUPABASE_URL is not set — skipping reseed (no preprod target)."
          fi

      - uses: actions/checkout@v7
        if: steps.gate.outputs.configured == 'true'

      - uses: actions/setup-node@v7
        if: steps.gate.outputs.configured == 'true'
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps
        if: steps.gate.outputs.configured == 'true'

      - name: Wipe and reseed
        if: steps.gate.outputs.configured == 'true'
        run: SEED_WIPE=1 npx tsx scripts/seed/preprod/index.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.PREPROD_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.PREPROD_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Summary
        if: always()
        # Pass the commit message via env (not inline ${{ }}) so backticks,
        # parens or newlines in it can't break — or inject into — the shell.
        # github.sha is hex, safe to inline.
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "## Preprod Reseed" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.gate.outputs.configured }}" = "true" ]; then
            echo "Triggered by: ${COMMIT_MSG%%$'\n'*}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Skipped — PREPROD_SUPABASE_URL not configured (no preprod target)." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
