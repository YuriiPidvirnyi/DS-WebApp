name: Visual Regression Testing

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  visual-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Run visual regression tests
        run: npm run test:visual

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-test-results
          path: test-results/
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-screenshots
          path: tests/visual/**/*-snapshots/
          retention-days: 30

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs')
            let comment = '## 📸 Visual Regression Test Results\n\n'
            
            try {
              const results = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'))
              const passed = results.suites.reduce((acc, suite) => acc + suite.specs.filter(s => s.ok).length, 0)
              const failed = results.suites.reduce((acc, suite) => acc + suite.specs.filter(s => !s.ok).length, 0)
              
              comment += `✅ Passed: ${passed}\n`
              comment += `❌ Failed: ${failed}\n\n`
              
              if (failed > 0) {
                comment += '### Failed Tests\n'
                results.suites.forEach(suite => {
                  suite.specs.filter(s => !s.ok).forEach(spec => {
                    comment += `- ${spec.title}\n`
                  })
                })
              }
              
              comment += '\n[View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            } catch (error) {
              comment += '⚠️ Could not parse test results\n'
              comment += `Error: ${error.message}`
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })

  compare-screenshots:
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build base version
        run: npm run build

      - name: Generate baseline screenshots
        run: npm run test:visual
        continue-on-error: true

      - name: Save baseline screenshots
        uses: actions/upload-artifact@v7
        with:
          name: baseline-screenshots
          path: tests/visual/**/*-snapshots/
          retention-days: 30

      - name: Download PR screenshots
        uses: actions/download-artifact@v8
        with:
          name: visual-screenshots
          path: pr-screenshots/

      - name: Compare screenshots
        run: |
          echo "## 🖼️ Screenshot Comparison" >> $GITHUB_STEP_SUMMARY
          BASELINE_DIR="tests/visual"
          PR_DIR="pr-screenshots"
          DIFF_COUNT=0
          MATCH_COUNT=0
          MISSING_COUNT=0

          if [ ! -d "$PR_DIR" ]; then
            echo "⚠️ PR screenshots directory not found — visual-tests artifact may be missing." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          while IFS= read -r -d '' baseline_file; do
            rel_path="${baseline_file#$BASELINE_DIR/}"
            pr_file="$PR_DIR/$rel_path"
            if [ -f "$pr_file" ]; then
              if cmp -s "$baseline_file" "$pr_file"; then
                MATCH_COUNT=$((MATCH_COUNT + 1))
              else
                DIFF_COUNT=$((DIFF_COUNT + 1))
                echo "⚠️  Visual diff detected: $rel_path" >> $GITHUB_STEP_SUMMARY
              fi
            else
              MISSING_COUNT=$((MISSING_COUNT + 1))
              echo "❓ Missing in PR: $rel_path" >> $GITHUB_STEP_SUMMARY
            fi
          done < <(find "$BASELINE_DIR" -name "*.png" -print0)

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Matching: $MATCH_COUNT | ⚠️ Changed: $DIFF_COUNT | ❓ Missing: $MISSING_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Note: comparison uses binary diff (cmp). Intentional UI changes will appear here — review artifacts to confirm._" >> $GITHUB_STEP_SUMMARY

          if [ "$DIFF_COUNT" -gt 0 ] || [ "$MISSING_COUNT" -gt 0 ]; then
            echo "Visual differences or missing screenshots detected. Review the uploaded screenshot artifacts."
            exit 1
          fi
