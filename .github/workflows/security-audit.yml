name: Security Audit

# Weekly rather than per-PR — keeps CI fast while still catching new advisories.
# Note: this uses GitHub Actions schedule, not Vercel Cron, because npm audit
# is a repo-gate concern (needs full checkout + node_modules) not a runtime concern.
on:
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Summary
        if: always()
        run: |
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY || true
