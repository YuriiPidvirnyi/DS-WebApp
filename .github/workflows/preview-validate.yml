name: Production A11y

# Accessibility audit (axe, WCAG 2 A/AA) of the live PUBLIC production site.
#
# Why a schedule (not only deployment_status):
#   - Vercel Deployment Protection guards Preview/per-deployment *.vercel.app URLs
#     (401), so they can't be audited from CI; only the Production public domain
#     (www.dentalstory.ua) is open.
#   - But Production deploys are RARE here (work happens on develop → preview;
#     main/prod ships infrequently). Gating solely on a Production deployment_status
#     meant this job would almost never run. So we also run it daily + on demand
#     against the always-up public site.
#
# a11y is read-only (axe only inspects the rendered DOM), so auditing prod is safe.
# Code-level a11y also runs in weekly-a11y.yml (local build); full e2e runs in
# ci.yml against a mocked build.
on:
  schedule:
    - cron: '30 7 * * *' # daily 07:30 UTC
  workflow_dispatch:
  deployment_status:

jobs:
  a11y:
    name: A11y (production site)
    runs-on: ubuntu-latest

    # Run on schedule/manual always; for a deployment_status event only when it is
    # a successful Production deploy (preview/staging deploys are protected → 401).
    if: >-
      github.event_name != 'deployment_status' ||
      (github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Production')

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Accessibility audit (axe, WCAG 2 A/AA)
        run: npm run a11y:audit
        env:
          # The public production domain — no Vercel protection, no bypass needed.
          BASE_URL: https://www.dentalstory.ua

      - name: Summary
        if: always()
        run: |
          echo "## Production A11y" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** https://www.dentalstory.ua" >> "$GITHUB_STEP_SUMMARY"
