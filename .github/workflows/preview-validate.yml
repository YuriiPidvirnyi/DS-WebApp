name: Production A11y

# Accessibility audit (axe, WCAG 2 A/AA) of the live PUBLIC production site.
#
# Key insight: Vercel Deployment Protection guards Preview/per-deployment
# *.vercel.app URLs (they return 401), but the Production public domain
# (www.dentalstory.ua) is open — so the audit needs NO bypass secret at all.
# a11y is read-only (axe only inspects the rendered DOM), so auditing prod is safe.
#
# Runs after each successful Production deployment. Code-level a11y also runs in
# weekly-a11y.yml (local server); full e2e runs in ci.yml against a mocked build.
on:
  deployment_status:

jobs:
  a11y:
    name: A11y (production)
    runs-on: ubuntu-latest

    # Only after a successful Production deploy — the public domain is reachable.
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Production'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Accessibility audit (axe, WCAG 2 A/AA)
        run: npm run a11y:audit
        env:
          # The public production domain — no Vercel protection, no bypass needed.
          BASE_URL: https://www.dentalstory.ua

      - name: Summary
        if: always()
        run: |
          echo "## Production A11y" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** https://www.dentalstory.ua" >> "$GITHUB_STEP_SUMMARY"
