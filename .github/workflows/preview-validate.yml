name: Preview Validate

# Runs against every successful Vercel deployment (preview + preprod + production).
# Replaces the old localhost-based a11y + smoke runs in ci.yml.
on:
  deployment_status:

jobs:
  validate:
    name: A11y + E2E (${{ github.event.deployment.environment }})
    runs-on: ubuntu-latest

    # Only fire when Vercel finishes successfully and gives us a URL
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment_url != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Accessibility audit
        run: npm run a11y:audit
        env:
          BASE_URL: ${{ github.event.deployment_status.environment_url }}

      - name: E2E smoke against deployment
        run: npx playwright test e2e/public-pages.smoke.spec.ts e2e/health-api.spec.ts e2e/cron-notifications.spec.ts e2e/booking-flow.spec.ts e2e/cabinet-flows.spec.ts e2e/admin-rbac.spec.ts --config=playwright.auth.config.ts
        env:
          BASE_URL: ${{ github.event.deployment_status.environment_url }}
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.environment_url }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        continue-on-error: true # advisory only until suites are stable

      - name: Summary
        if: always()
        run: |
          echo "## Preview Validation" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.deployment.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ github.event.deployment_status.environment_url }}" >> $GITHUB_STEP_SUMMARY
