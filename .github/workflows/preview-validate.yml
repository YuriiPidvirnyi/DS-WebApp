name: Preview Validate

# Accessibility audit against every successful NON-production Vercel deployment
# (preview + preprod/staging). Production is deliberately excluded — this project
# shares a single Supabase between preview and prod, so we never point a CI run at
# a live deployment that could mutate real data. a11y is read-only (axe only
# inspects the rendered DOM), so it is safe here.
#
# Complementary coverage: code-level a11y runs in weekly-a11y.yml (local server,
# no deployment protection); the full e2e suite runs in ci.yml against a mocked
# build. The previous "E2E smoke against deployment" step was removed: it used the
# localhost webServer config (so it never actually hit the deployment) and, had it
# worked, the booking/cabinet/cron specs would have written to the shared prod DB.
on:
  deployment_status:

jobs:
  a11y:
    name: A11y (${{ github.event.deployment_status.environment }})
    runs-on: ubuntu-latest

    # Fire only on a successful deploy that exposes a URL — and never for Production.
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment_url != '' &&
      github.event.deployment_status.environment != 'Production'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Accessibility audit (axe, WCAG 2 A/AA)
        run: npm run a11y:audit
        env:
          BASE_URL: ${{ github.event.deployment_status.environment_url }}
          # Bypass Vercel Deployment Protection so CI can reach the protected deployment.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Summary
        if: always()
        run: |
          echo "## Deployment A11y" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** ${{ github.event.deployment_status.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${{ github.event.deployment_status.environment_url }}" >> "$GITHUB_STEP_SUMMARY"
