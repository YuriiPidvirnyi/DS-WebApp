  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [build_and_test]
    if: always()
    
    steps:
      - name: Send Slack Notification on Success
        if: ${{ needs.build_and_test.result == 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: 'Dental Story Webapp Build Succeeded ✅'
          SLACK_MESSAGE: 'Build and tests passed successfully!'
          SLACK_COLOR: good
          MSG_MINIMAL: false
      
      - name: Send Slack Notification on Failure
        if: ${{ needs.build_and_test.result != 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: 'Dental Story Webapp Build Failed ❌'
          SLACK_MESSAGE: 'Build or tests failed. Please check GitHub Actions logs for details.'
          SLACK_COLOR: danger
          MSG_MINIMAL: false