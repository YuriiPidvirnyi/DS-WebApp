name: Deploy Dental Story Webapp

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Type Check
        run: npm run typecheck
      
      - name: Lint
        run: npm run lint
      
      # Uncomment when tests are added
      # - name: Run Tests
      #   run: npm test
      
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_ANALYTICS_ID: ${{ secrets.VITE_GOOGLE_ANALYTICS_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_ENVIRONMENT: 'production'
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist
          retention-days: 7
  
  # Add this job when ready to deploy to actual hosting
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    # For actual deployment, remove the 'if: false' line below
    if: false
    
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist
      
      # Deployment to hosting provider - Choose one based on selected hosting
      
