version: 2
updates:
  # Enable version updates for npm — PRs target develop (preproduction)
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Kyiv'
    open-pull-requests-limit: 10
    reviewers:
      - 'YuriiPidvirnyi'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    versioning-strategy: increase
    groups:
      react:
        patterns:
          - 'react*'
          - '@types/react*'
      testing:
        patterns:
          - '@testing-library/*'
          - 'vitest*'
          - '@vitest/*'
          - 'playwright*'
          - '@playwright/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'

  # Enable version updates for GitHub Actions — PRs target develop
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Kyiv'
    open-pull-requests-limit: 5
    reviewers:
      - 'YuriiPidvirnyi'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'ci'
      - 'automated'
