version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Kyiv'
    open-pull-requests-limit: 10
    reviewers:
      - 'YuriiPidvirnyi'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    versioning-strategy: increase
    groups:
      next:
        patterns:
          - 'next'
          - '@next/*'
      sentry:
        patterns:
          - '@sentry/*'
      supabase:
        patterns:
          - '@supabase/*'
      i18n:
        patterns:
          - 'i18next*'
          - 'react-i18next'
      react:
        patterns:
          - 'react*'
          - '@types/react*'
      testing:
        patterns:
          - '@testing-library/*'
          - 'vitest*'
          - '@vitest/*'
          - 'playwright*'
          - '@playwright/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
      storybook:
        patterns:
          - 'storybook*'
          - '@storybook/*'
      vite:
        patterns:
          - 'vite*'
          - '@vitejs/*'

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Kyiv'
    open-pull-requests-limit: 5
    reviewers:
      - 'YuriiPidvirnyi'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'ci'
      - 'automated'
