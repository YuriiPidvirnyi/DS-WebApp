version: 2
updates:
  # Enable version updates for npm — PRs target develop (preproduction)
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Kyiv'
    open-pull-requests-limit: 10
    reviewers:
      - 'YuriiPidvirnyi'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    versioning-strategy: increase
    ignore:
      # Pinned for security — serialize-javascript ≤7.0.2 is vulnerable (GHSA-5c6j-r48x-rmvq)
      - dependency-name: 'serialize-javascript'
    groups:
      # Minor and patch updates — eligible for auto-merge with green CI
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      # Major updates — manual review required, kept in separate PRs
      major-updates:
        patterns:
          - '*'
        update-types:
          - 'major'

  # Enable version updates for GitHub Actions — PRs target develop
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Kyiv'
    open-pull-requests-limit: 5
    reviewers:
      - 'YuriiPidvirnyi'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'github-actions'
      - 'automated'
    groups:
      actions:
        patterns:
          - '*'
