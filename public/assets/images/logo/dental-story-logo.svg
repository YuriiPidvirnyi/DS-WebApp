<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <style>
    .logo-text { 
      font-family: 'Stolzl Medium', system-ui, sans-serif; 
      font-weight: 500;
      fill: #AECED3;
    }
    .tooth-shape { 
      fill: #AECED3; 
    }
    .tooth-inner { 
      fill: #FFFFFF; 
    }
  </style>
  
  <!-- Tooth with integrated D -->
  <g transform="translate(10, 10)">
    <!-- Main tooth shape -->
    <path class="tooth-shape" d="M20 5 C30 5, 35 10, 35 20 L35 30 C35 35, 30 40, 20 40 C10 40, 5 35, 5 30 L5 20 C5 10, 10 5, 20 5 Z"/>
    
    <!-- Letter D integrated into tooth (negative space) -->
    <path class="tooth-inner" d="M15 12 L15 33 L22 33 C27 33, 30 29, 30 25 L30 20 C30 16, 27 12, 22 12 L15 12 Z"/>
  </g>
  
  <!-- Text "ental Story" -->
  <text x="50" y="32" class="logo-text" font-size="18">ental</text>
  <text x="50" y="50" class="logo-text" font-size="18">Story</text>
</svg>