version: '3.8'

services:
  # Frontend application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./app:/app/app
      - ./public:/app/public
      - ./next.config.ts:/app/next.config.ts
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:3001/api
      - NEXT_PUBLIC_ENVIRONMENT=development
    depends_on:
      - backend
    networks:
      - dental-network

  # Backend API (mock for now)
  backend:
    image: node:18-alpine
    working_dir: /app
    command: npx json-server --watch db.json --port 3001 --host 0.0.0.0
    ports:
      - '3001:3001'
    volumes:
      - ./mock-api:/app
    networks:
      - dental-network

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=dental
      - POSTGRES_PASSWORD=dental_secret
      - POSTGRES_DB=dental_story
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dental-network

  # Redis for caching/sessions
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - dental-network

  # Adminer for database management
  adminer:
    image: adminer
    ports:
      - '8080:8080'
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - dental-network

volumes:
  postgres_data:

networks:
  dental-network:
    driver: bridge
